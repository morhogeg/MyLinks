name: iOS → TestFlight

# Builds the web bundle, syncs it into the Capacitor iOS app, archives, and
# uploads to TestFlight — on a real macOS runner, so nobody has to open Xcode.
#
# Trigger: manually (Actions tab → Run workflow) or automatically on pushes to
# main that touch the app. See the one-time secret setup at the bottom.

on:
  workflow_dispatch:
    inputs:
      require_auth:
        description: >-
          Bake NEXT_PUBLIC_REQUIRE_AUTH=true into the bundle (shows the
          Apple/Google sign-in gate + Account section on device). Use for
          on-device auth verification and for the post-cutover store builds.
          Default OFF = legacy pre-cutover behavior (no sign-in UI).
        type: boolean
        default: false
  # TEMPORARY: verification trigger for the P1 pack (privacy manifests wired
  # into both targets, iPhone-only, AI consent). Remove after green.
  push:
    branches: [claude/machina-readiness-consolidation-yq73k4]
  # AUTO-BUILD TEMPORARILY GATED during the multi-user auth cutover.
  # The build now includes the Sign in with Apple entitlement and the
  # @capacitor-firebase/authentication pod (native Firebase SDK). Archiving
  # requires (a) "Sign in with Apple" enabled on the App ID in the Apple
  # Developer portal and (b) GoogleService-Info.plist available to the build,
  # or the app fails to sign / crashes on launch. Until those are set up (see
  # NATIVE_AUTH_SETUP.md), run this workflow MANUALLY (Actions → Run workflow)
  # after verifying a build on a device. Re-enable the push trigger below once
  # the native setup is confirmed:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'web/**'
  #     - '.github/workflows/ios-testflight.yml'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    # macos-26 ships Xcode 26. The Capacitor 8 SPM binary (capacitor-swift-pm)
    # gates core APIs (CAPPluginCall.reject, getString(_:), …) behind the
    # experimental $NonescapableTypes Swift feature in its .swiftinterface;
    # Xcode 16 (macos-14) strips those symbols, so @capacitor/share fails to
    # compile (see ionic-team/capacitor#8333). Xcode 26 resolves them, so
    # Share + Haptics + firebase-auth all build (verified green: run #6,
    # 2026-07-02, archived + uploaded with all three plugins).
    runs-on: macos-26
    timeout-minutes: 45
    env:
      # Live Firebase Hosting origin (rewrites /api/* to the Cloud Functions).
      API_BASE: https://secondbrain-app-94da2.web.app
      TEAM_ID: 8Y2M94RUHG
      BUNDLE_ID: com.morhogeg.machina

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Capacitor 8's CLI requires Node >= 22.
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"

      # Build number: strictly increasing, well above the manual builds (18).
      - name: Compute build number
        id: bn
        run: echo "value=$(( 1000 + ${{ github.run_number }} ))" >> "$GITHUB_OUTPUT"

      - name: Build web bundle + Capacitor sync
        working-directory: web
        env:
          NEXT_PUBLIC_API_BASE: ${{ env.API_BASE }}
          NEXT_PUBLIC_SHARE_BASE: ${{ env.API_BASE }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          # Flag-gated auth cutover: only baked in when the run is dispatched
          # with require_auth=true (see NATIVE_AUTH_SETUP.md).
          NEXT_PUBLIC_REQUIRE_AUTH: ${{ inputs.require_auth == true && 'true' || '' }}
        run: |
          echo "NEXT_PUBLIC_REQUIRE_AUTH='${NEXT_PUBLIC_REQUIRE_AUTH}' (empty = pre-cutover legacy behavior)"
          npm ci
          npm run build
          npx cap sync ios
          test -f ios/App/App/public/index.html || { echo "::error::web bundle not synced"; exit 1; }
          echo "SPM plugins in the generated manifest (native firebase-auth included):"
          grep -E '\.product\(name: "Capacitor' ios/App/CapApp-SPM/Package.swift || true

      # Native Firebase (the @capacitor-firebase/authentication pod) reads
      # GoogleService-Info.plist at launch; it's gitignored, so materialize it
      # from a secret into the App target (the .pbxproj references it as a bundle
      # resource). Without this the archive fails on a missing input file.
      - name: Write GoogleService-Info.plist
        env:
          GS_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "$GS_PLIST_BASE64" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST_BASE64 secret is not set — add it (see docs/IOS_CICD.md)."
            exit 1
          fi
          echo "$GS_PLIST_BASE64" | base64 --decode > web/ios/App/App/GoogleService-Info.plist
          test -s web/ios/App/App/GoogleService-Info.plist || { echo "::error::plist decoded to an empty file"; exit 1; }
          echo "Wrote GoogleService-Info.plist ($(wc -c < web/ios/App/App/GoogleService-Info.plist) bytes)"

      # Native Google Sign-In needs the app to claim the REVERSED_CLIENT_ID URL
      # scheme (NATIVE_AUTH_SETUP.md §4.2) or the Google flow can't return to
      # the app. The value lives inside the (secret) GoogleService-Info.plist,
      # so inject it into Info.plist at build time instead of committing it.
      # Idempotent; Apple sign-in needs no URL scheme.
      - name: Add REVERSED_CLIENT_ID URL scheme to Info.plist
        run: |
          PB=/usr/libexec/PlistBuddy
          GS=web/ios/App/App/GoogleService-Info.plist
          INFO=web/ios/App/App/Info.plist
          RCID="$($PB -c 'Print :REVERSED_CLIENT_ID' "$GS" 2>/dev/null || true)"
          if [ -z "$RCID" ]; then
            echo "::error::REVERSED_CLIENT_ID missing from GoogleService-Info.plist — re-download it from Firebase (iOS app must have an OAuth client)."
            exit 1
          fi
          if ! $PB -c 'Print :CFBundleURLTypes' "$INFO" >/dev/null 2>&1; then
            $PB -c 'Add :CFBundleURLTypes array' "$INFO"
          fi
          if ! grep -q "$RCID" "$INFO"; then
            IDX=$($PB -c 'Print :CFBundleURLTypes' "$INFO" | grep -c 'Dict' || true)
            $PB -c "Add :CFBundleURLTypes:${IDX} dict" "$INFO"
            $PB -c "Add :CFBundleURLTypes:${IDX}:CFBundleURLSchemes array" "$INFO"
            $PB -c "Add :CFBundleURLTypes:${IDX}:CFBundleURLSchemes:0 string ${RCID}" "$INFO"
          fi
          echo "URL scheme registered: ${RCID:0:24}…"

      # Signing uses Apple "cloud-managed" distribution: xcodebuild, given the
      # App Store Connect API key + -allowProvisioningUpdates, creates/reuses a
      # cloud signing certificate and provisioning profile automatically. No
      # manually-exported .p12 certificate is needed (that's the step people get
      # stuck on). Requires the project's automatic signing (CODE_SIGN_STYLE =
      # Automatic), which this app already uses.

      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Archive
        working-directory: web/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild clean archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CURRENT_PROJECT_VERSION=${{ steps.bn.outputs.value }} \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Export IPA
        working-directory: web/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)"
          echo "Uploading $IPA (build ${{ steps.bn.outputs.value }})"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
