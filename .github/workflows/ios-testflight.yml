name: iOS → TestFlight

# Builds the web bundle, syncs it into the Capacitor iOS app, archives, and
# uploads to TestFlight — on a real macOS runner, so nobody has to open Xcode.
#
# Trigger: manually (Actions tab → Run workflow) or automatically on pushes to
# main that touch the app. See the one-time secret setup at the bottom.

on:
  push:
    branches: [claude/ship-tf-trigger-filter-order]
  workflow_dispatch:
    inputs:
      require_auth:
        description: >-
          Bake NEXT_PUBLIC_REQUIRE_AUTH=true into the bundle (shows the
          Apple/Google sign-in gate + Account section on device). Use for
          on-device auth verification and for the post-cutover store builds.
          Default OFF = legacy pre-cutover behavior (no sign-in UI).
        type: boolean
        default: false
  # AUTO-BUILD TEMPORARILY GATED during the multi-user auth cutover.
  # The build now includes the Sign in with Apple entitlement and the
  # @capacitor-firebase/authentication pod (native Firebase SDK). Archiving
  # requires (a) "Sign in with Apple" enabled on the App ID in the Apple
  # Developer portal and (b) GoogleService-Info.plist available to the build,
  # or the app fails to sign / crashes on launch. Until those are set up (see
  # NATIVE_AUTH_SETUP.md), run this workflow MANUALLY (Actions → Run workflow)
  # after verifying a build on a device. Re-enable the push trigger below once
  # the native setup is confirmed:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'web/**'
  #     - '.github/workflows/ios-testflight.yml'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    # macos-26 ships Xcode 26. The Capacitor 8 SPM binary (capacitor-swift-pm)
    # gates core APIs (CAPPluginCall.reject, getString(_:), …) behind the
    # experimental $NonescapableTypes Swift feature in its .swiftinterface;
    # Xcode 16 (macos-14) strips those symbols, so @capacitor/share fails to
    # compile (see ionic-team/capacitor#8333). Xcode 26 resolves them, so
    # Share + Haptics + firebase-auth all build (verified green: run #6,
    # 2026-07-02, archived + uploaded with all three plugins).
    runs-on: macos-26
    timeout-minutes: 45
    env:
      # Live Firebase Hosting origin (rewrites /api/* to the Cloud Functions).
      API_BASE: https://secondbrain-app-94da2.web.app
      TEAM_ID: 8Y2M94RUHG
      BUNDLE_ID: com.morhogeg.machina

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Capacitor 8's CLI requires Node >= 22.
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Select latest Xcode
        # Pick the newest Xcode 26 GA, never a beta: a beta toolchain can bake
        # an unstable / rejected-at-review binary. Filter out any path matching
        # "beta" (grep -vi beta) BEFORE sort -V, and hard-fail if nothing is left.
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          if [ -z "$XCODE" ]; then
            echo "::error::No non-beta Xcode 26 found on the runner (only betas or none matched /Applications/Xcode_26*.app). Refusing to build with a beta toolchain."
            exit 1
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"

      # Build number: strictly increasing, well above the manual builds (18).
      - name: Compute build number
        id: bn
        run: echo "value=$(( 1000 + ${{ github.run_number }} ))" >> "$GITHUB_OUTPUT"

      # Fail fast on a misconfigured runner: a build with empty Firebase config
      # bakes a dead bundle (no auth, broken client init) that still archives
      # green and ships to TestFlight. Guard the load-bearing keys BEFORE the
      # build — same empty-check pattern as the GS_PLIST_BASE64 step below.
      - name: Verify required Firebase secrets are set
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: |
          if [ -z "$NEXT_PUBLIC_FIREBASE_API_KEY" ]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_API_KEY secret is not set — add it (see docs/IOS_CICD.md)."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_FIREBASE_PROJECT_ID" ]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_PROJECT_ID secret is not set — add it (see docs/IOS_CICD.md)."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_FIREBASE_APP_ID" ]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_APP_ID secret is not set — add it (see docs/IOS_CICD.md)."
            exit 1
          fi
          echo "Required Firebase secrets present."

      - name: Build web bundle + Capacitor sync
        working-directory: web
        env:
          NEXT_PUBLIC_API_BASE: ${{ env.API_BASE }}
          NEXT_PUBLIC_SHARE_BASE: ${{ env.API_BASE }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          # Flag-gated auth cutover: only baked in when the run is dispatched
          # with require_auth=true (see NATIVE_AUTH_SETUP.md).
          NEXT_PUBLIC_REQUIRE_AUTH: ${{ inputs.require_auth == true && 'true' || '' }}
        run: |
          echo "NEXT_PUBLIC_REQUIRE_AUTH='${NEXT_PUBLIC_REQUIRE_AUTH}' (empty = pre-cutover legacy behavior)"
          npm ci
          npm run build
          npx cap sync ios
          test -f ios/App/App/public/index.html || { echo "::error::web bundle not synced"; exit 1; }
          echo "SPM plugins in the generated manifest (native firebase-auth included):"
          grep -E '\.product\(name: "Capacitor' ios/App/CapApp-SPM/Package.swift || true

      # Native Firebase (the @capacitor-firebase/authentication pod) reads
      # GoogleService-Info.plist at launch; it's gitignored, so materialize it
      # from a secret into the App target (the .pbxproj references it as a bundle
      # resource). Without this the archive fails on a missing input file.
      - name: Write GoogleService-Info.plist
        env:
          GS_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "$GS_PLIST_BASE64" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST_BASE64 secret is not set — add it (see docs/IOS_CICD.md)."
            exit 1
          fi
          echo "$GS_PLIST_BASE64" | base64 --decode > web/ios/App/App/GoogleService-Info.plist
          test -s web/ios/App/App/GoogleService-Info.plist || { echo "::error::plist decoded to an empty file"; exit 1; }
          echo "Wrote GoogleService-Info.plist ($(wc -c < web/ios/App/App/GoogleService-Info.plist) bytes)"

      # Native Google Sign-In needs the app to claim the REVERSED_CLIENT_ID URL
      # scheme (NATIVE_AUTH_SETUP.md §4.2) or the Google flow can't return to
      # the app. The value lives inside the (secret) GoogleService-Info.plist,
      # so inject it into Info.plist at build time instead of committing it.
      # Idempotent; Apple sign-in needs no URL scheme.
      - name: Add REVERSED_CLIENT_ID URL scheme to Info.plist
        run: |
          PB=/usr/libexec/PlistBuddy
          GS=web/ios/App/App/GoogleService-Info.plist
          INFO=web/ios/App/App/Info.plist
          RCID="$($PB -c 'Print :REVERSED_CLIENT_ID' "$GS" 2>/dev/null || true)"
          if [ -z "$RCID" ]; then
            echo "::error::REVERSED_CLIENT_ID missing from GoogleService-Info.plist — re-download it from Firebase (iOS app must have an OAuth client)."
            exit 1
          fi
          if ! $PB -c 'Print :CFBundleURLTypes' "$INFO" >/dev/null 2>&1; then
            $PB -c 'Add :CFBundleURLTypes array' "$INFO"
          fi
          if ! grep -q "$RCID" "$INFO"; then
            IDX=$($PB -c 'Print :CFBundleURLTypes' "$INFO" | grep -c 'Dict' || true)
            $PB -c "Add :CFBundleURLTypes:${IDX} dict" "$INFO"
            $PB -c "Add :CFBundleURLTypes:${IDX}:CFBundleURLSchemes array" "$INFO"
            $PB -c "Add :CFBundleURLTypes:${IDX}:CFBundleURLSchemes:0 string ${RCID}" "$INFO"
          fi
          echo "URL scheme registered: ${RCID:0:24}…"

      # ── Signing ────────────────────────────────────────────────────────────
      # The app uses automatic signing (CODE_SIGN_STYLE = Automatic). xcodebuild,
      # given the App Store Connect API key + -allowProvisioningUpdates, manages
      # the provisioning PROFILES automatically — profiles are uncapped, so that
      # part is fine.
      #
      # The CERTIFICATE is the problem. A GitHub runner is ephemeral: empty
      # keychain, no private key. With no identity to reuse, automatic signing
      # asks Apple to MINT A NEW certificate every run — and that cert dies with
      # the runner. Apple caps certificates (2 Apple Development per account), so
      # every few runs the archive fails with "maximum number of certificates"
      # until someone revokes old ones by hand (runs #15/#16/#31/#42). The step
      # below ends that treadmill: it imports ONE persistent signing identity
      # (a .p12 exported once by the owner) into a temporary keychain, so
      # automatic signing REUSES it and never mints a new cert.
      # One-time setup: docs/IOS_CICD.md → "Stable signing certificate".
      - name: Install signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERT_P12_BASE64" ]; then
            echo "::warning::BUILD_CERTIFICATE_P12_BASE64 is not set — falling back to cloud-managed signing, which MINTS A NEW Apple certificate every run and periodically hits Apple's certificate cap (you then have to revoke certs by hand). Add the secret to stop this permanently: docs/IOS_CICD.md → 'Stable signing certificate'."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/build_cert.p12"
          security import "$RUNNER_TEMP/build_cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # Let codesign use the private key non-interactively (no UI prompt on CI).
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make our keychain visible to xcodebuild (prepend to the user search list).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          echo "Signing identities in the CI keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN"
          if security find-identity -v -p codesigning "$KEYCHAIN" | grep -q '0 valid identities found'; then
            echo "::error::The imported .p12 has no code-signing identity — it was exported without its private key, or the password is wrong. Re-export the certificate WITH its private key (see docs/IOS_CICD.md)."
            exit 1
          fi
          echo "Certificate installed — automatic signing will reuse it; no new cert is minted."

      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Archive
        working-directory: web/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # SIGNED archive (automatic signing) — do NOT "optimize" this to an
          # unsigned archive + sign-at-export: build 1018 shipped that way and
          # LOST the App Group entitlement (group.com.morhogeg.machina), which
          # silently broke the Share Extension's token bridge ("Open Machina
          # and sign in first"). Entitlements are baked at archive-time
          # codesign; export re-signing from an unsigned archive does not
          # restore them. The entitlement check step below is the tripwire.
          # Certificate reuse: the "Install signing certificate" step above
          # imports one persistent identity so automatic signing does NOT mint a
          # new cert per run. If that secret is ever unset, this reverts to
          # cloud-managed minting and will eventually hit Apple's cert cap
          # ("maximum number of certificates") — then prune at developer.apple.com
          # → Certificates and, better, set BUILD_CERTIFICATE_P12_BASE64.
          xcodebuild clean archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CURRENT_PROJECT_VERSION=${{ steps.bn.outputs.value }} \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Export IPA
        working-directory: web/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # Tripwire for the build-1018 regression: verify the signed IPA actually
      # carries the App Group entitlement in BOTH the app and the Share
      # Extension. Without it the ingest-token bridge silently dies and every
      # share shows "Open Machina and sign in first". Fail here, never on a
      # user's phone.
      - name: Verify entitlements in exported IPA
        run: |
          cd "$RUNNER_TEMP/export"
          unzip -q -o *.ipa
          for TARGET in "Payload/App.app" "Payload/App.app/PlugIns/ShareExt.appex"; do
            echo "── entitlements: $TARGET"
            ENT="$(codesign -d --entitlements :- "$TARGET" 2>/dev/null)"
            echo "$ENT" | grep -q "group.com.morhogeg.machina" || {
              echo "::error::$TARGET is missing the App Group entitlement (group.com.morhogeg.machina) — the Share Extension token bridge would be broken. Refusing to upload."
              echo "$ENT"
              exit 1
            }
          done
          # Sign in with Apple entitlement — HARD requirement. The app ships
          # Google sign-in, so App Store Review Guideline 4.8 mandates Sign in
          # with Apple as an equivalent login option; a build missing the
          # entitlement is a guaranteed App Review rejection. Fail here, not at
          # review.
          APP_ENT="$(codesign -d --entitlements :- Payload/App.app 2>/dev/null)"
          echo "$APP_ENT" | grep -q "com.apple.developer.applesignin" || {
            echo "::error::App is missing the Sign in with Apple entitlement (com.apple.developer.applesignin) — App Review Guideline 4.8 requires it because the app offers Google sign-in, so this build would be rejected at review. Refusing to upload."
            echo "$APP_ENT"
            exit 1
          }

          # aps-environment must be present AND equal to "production". The source
          # App.entitlements deliberately says "development"; the App Store
          # distribution profile is supposed to rewrite it to "production" during
          # export — so this is the ground-truth check on the EXPORTED IPA. If the
          # value is "development" (or missing), the app registers with the APNs
          # SANDBOX and receives sandbox push tokens, which the PRODUCTION APNs
          # servers cannot deliver to — push would silently never reach real
          # TestFlight / App Store users. Extract the value via PlistBuddy and
          # hard-fail on anything other than "production".
          echo "$APP_ENT" | grep -q "aps-environment" || {
            echo "::error::App is missing the aps-environment entitlement — push notifications would silently never register. Refusing to upload."
            echo "$APP_ENT"
            exit 1
          }
          echo "$APP_ENT" > "$RUNNER_TEMP/app-entitlements.plist"
          APS_ENV="$(/usr/libexec/PlistBuddy -c 'Print :aps-environment' "$RUNNER_TEMP/app-entitlements.plist" 2>/dev/null || true)"
          if [ "$APS_ENV" != "production" ]; then
            echo "::error::aps-environment in the exported IPA is '${APS_ENV:-<empty/missing>}', expected 'production'. A 'development' value means the app gets APNs SANDBOX push tokens, which the production APNs servers cannot deliver to — push would silently never reach real TestFlight / App Store users. The App Store distribution profile is supposed to rewrite the source 'development' value to 'production' at export; it did not. Refusing to upload."
            echo "$APP_ENT"
            exit 1
          fi
          echo "Entitlements OK: App Group present in app + extension; Sign in with Apple present; aps-environment=production."

          # URL-scheme tripwire: the archived Info.plist must still carry BOTH the
          # custom "machina" scheme (Share Extension → "Open Machina") AND the
          # injected Google REVERSED_CLIENT_ID scheme, or the Google sign-in flow
          # can't return to the app. A build that drops either archives green but
          # ships a broken app. Read the compiled plist inside the .app bundle.
          PB=/usr/libexec/PlistBuddy
          APP_INFO="Payload/App.app/Info.plist"
          URL_TYPES="$($PB -c 'Print :CFBundleURLTypes' "$APP_INFO" 2>/dev/null || true)"
          echo "$URL_TYPES" | grep -q "machina" || {
            echo "::error::Archived Info.plist is missing the 'machina' URL scheme — the Share Extension 'Open Machina' deep link would be broken. Refusing to upload."
            echo "$URL_TYPES"
            exit 1
          }
          GS="$GITHUB_WORKSPACE/web/ios/App/App/GoogleService-Info.plist"
          RCID="$($PB -c 'Print :REVERSED_CLIENT_ID' "$GS" 2>/dev/null || true)"
          if [ -z "$RCID" ]; then
            echo "::error::REVERSED_CLIENT_ID missing from GoogleService-Info.plist at verify time — cannot confirm the archived app registered the Google URL scheme. Refusing to upload."
            exit 1
          fi
          echo "$URL_TYPES" | grep -q "$RCID" || {
            echo "::error::Archived Info.plist is missing the injected REVERSED_CLIENT_ID URL scheme (${RCID:0:24}…) — the Google sign-in callback would fail. Refusing to upload."
            echo "$URL_TYPES"
            exit 1
          }
          echo "URL schemes OK: 'machina' + REVERSED_CLIENT_ID present in archived Info.plist."

      # Upload via a SECOND xcodebuild -exportArchive pass with
      # destination=upload — Apple's supported path, replacing the deprecated
      # `xcrun altool --upload-app`. We deliberately do NOT fold the upload into
      # the earlier "Export IPA" step: that step uses destination=export so the
      # entitlement/URL-scheme tripwires above can crack the exported IPA and
      # refuse to ship a bad build. This step re-runs -exportArchive against the
      # SAME archive with destination=upload, which builds and uploads the IPA
      # to App Store Connect in one operation — and only runs once the tripwires
      # have passed. Same App Store Connect API key auth as the export step
      # (cloud signing via -allowProvisioningUpdates + the -authenticationKey*
      # flags); no altool, no Transporter.
      - name: Upload to TestFlight
        working-directory: web/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo "Uploading build ${{ steps.bn.outputs.value }} via xcodebuild -exportArchive (destination=upload)"
          cat > "$RUNNER_TEMP/UploadOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>upload</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/upload" \
            -exportOptionsPlist "$RUNNER_TEMP/UploadOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
