name: CI

# Regression net for every PR (and pushes to main): typecheck the web app,
# byte-compile the Cloud Functions, and run the locked-ruleset emulator tests.
# Until this existed, ios-testflight.yml was the only workflow and nothing
# guarded merges — a tsc break or a Python syntax error could land on main.

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-typecheck:
    name: web · tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npx tsc --noEmit

  functions-compile:
    name: functions · py_compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Byte-compile all functions
        working-directory: functions
        run: python -m py_compile *.py

  rules-test:
    name: firestore rules · emulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firestore-rules-test/package-lock.json
      # The Firestore emulator runs on the JVM.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install deps
        working-directory: firestore-rules-test
        run: npm ci
      - name: Run locked-ruleset tests
        working-directory: firestore-rules-test
        run: npm test
