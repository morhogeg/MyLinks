name: Firestore rules tests

# Emulator tests for the locked Firestore ruleset (firestore.rules.locked),
# exercised through @firebase/rules-unit-testing against the local Firestore
# emulator. The emulator is a Java JAR that firebase-tools downloads on first
# run, so the runner needs Node (for the test suite + firebase CLI) and a JDK.
on:
  push:
    branches: [main]
    paths:
      - "firestore.rules*"
      - "firestore-rules-test/**"
      - ".github/workflows/rules-tests.yml"
  pull_request:
    paths:
      - "firestore.rules*"
      - "firestore-rules-test/**"
      - ".github/workflows/rules-tests.yml"

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firestore-rules-test/package-lock.json

      - name: Set up Java (Firestore emulator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        working-directory: firestore-rules-test
        run: npm ci

      - name: Run rules tests
        working-directory: firestore-rules-test
        run: npm test
