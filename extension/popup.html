<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machina AI settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#7c3aed" />
              <stop offset="1" stop-color="#ec4899" />
            </linearGradient>
          </defs>
          <path fill="url(#g)" d="M16 3c-3.6 0-6.5 2.6-6.9 6C6.2 9.6 4 12.2 4 15.3c0 2 .9 3.7 2.4 4.9-.2.6-.4 1.3-.4 2 0 3 2.5 5.5 5.6 5.5 1.5 0 2.9-.6 3.9-1.5h1c1 .9 2.4 1.5 3.9 1.5 3.1 0 5.6-2.5 5.6-5.5 0-.7-.1-1.4-.4-2C27.1 19 28 17.3 28 15.3c0-3.1-2.2-5.7-5.1-6.3-.4-3.4-3.3-6-6.9-6z" />
          <circle cx="16" cy="15.5" r="2.4" fill="#fff" opacity="0.9" />
        </svg>
      </div>
      <div class="titles">
        <h1>Machina AI</h1>
        <p class="sub">Save to your knowledge brain</p>
      </div>
    </header>

    <div id="banner" class="banner hidden"></div>

    <section class="field">
      <label for="token">Ingest token</label>
      <input id="token" type="password" autocomplete="off" spellcheck="false"
             placeholder="Paste your Machina AI token to start saving" />
      <button id="reveal" type="button" class="link-btn">Show</button>
      <p class="hint">From the Machina AI app → Settings (the same token the iOS Shortcut uses).</p>
    </section>

    <section class="field">
      <label for="baseUrl">Backend URL <span class="opt">(optional)</span></label>
      <input id="baseUrl" type="text" autocomplete="off" spellcheck="false"
             placeholder="https://secondbrain-app-94da2.web.app" />
    </section>

    <div class="actions">
      <button id="save" type="button" class="primary">Save settings</button>
      <button id="test" type="button" class="secondary">Test connection</button>
    </div>

    <div class="divider"></div>

    <button id="saveTab" type="button" class="wide">Save this page now</button>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
